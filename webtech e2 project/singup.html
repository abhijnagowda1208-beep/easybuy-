<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Sign Up</legend>
            <label for="username">Enter Username:</label>
            <input type="text" placeholder="Enter username" id="username" name="username" required>
            <br><br>
            <label for="email">Enter Email:</label>
            <input type="email" placeholder="Enter email" id="email" name="email" required>
            <br><br>
            <label for="password">Enter Password:</label>
            <input type="password" placeholder="Enter password" id="password" name="password" required>
            <br><br>
            <label for="Phnum">Enter Phone Number:</label>
            <input type="tel" minlength="10" maxlength="10" placeholder="Enter phone number" id="Phnum" name="Phnum" required>
            <br><br>
            <label for="age">Enter Age:</label>
            <input type="number" placeholder="Enter age" id="age" name="age">
            <br><br>
            <label for="dob">Enter Date of Birth:</label>
            <input type="date" placeholder="Enter date of birth" id="dob" name="dob">
            <br><br>
            <label for="image">Upload Image:</label>
            <input type="file" placeholder="Upload Image" id="file" name="image">
            <br><br>
            <button>Submit</button>
            <button>Reset</button>
        </fieldset>
    </form>
    
</body>
<script src="./signup.js"></script>
</script>
</html>
